name: Load data to Neon (DEV)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: load-to-neon-dev
  cancel-in-progress: false

jobs:
  migrate-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database migrations (DEV)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "Running migrations on DEV..."
          python scripts/run_migrations.py

  run-etl:
    needs: migrate-dev
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        category: [fruit_veg, dairy_breakfast, beverages]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL pipeline (DEV)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python pipeline/run_pipeline.py --retailer migros --category ${{ matrix.category }}
