  run-etl:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        category: [fruit_veg, dairy_breakfast, beverages]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run database migrations (PROD)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
        run: |
          set -euo pipefail
          echo "Running migrations on PROD..."

          for file in $(ls database/migrations/*.sql | sort); do
            echo "Running $file"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file"
          done

      - name: Run ETL pipeline (PROD)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pipeline.run_pipeline --retailer migros --category ${{ matrix.category }}
