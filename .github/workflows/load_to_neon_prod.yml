name: Load data to Neon (PROD)

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: load-to-neon-prod
  cancel-in-progress: false

jobs:
  migrate-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database migrations (PROD)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "Running migrations on PROD..."
          python scripts/run_migrations.py

  run-etl:
    needs: migrate-prod
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        category: [fruit_veg, dairy_breakfast, beverages]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL pipeline (PROD)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -m pipeline.run_pipeline --retailer migros --category ${{ matrix.category }}
