name: Load A101 to Neon (DEV)

on:
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run database migrations (DEV)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
        run: |
          set -euo pipefail
          echo "Running migrations on DEV..."

          for file in $(ls database/migrations/*.sql | sort); do
            echo "Running $file"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file"
          done

      - name: Run A101 pipeline (DEV)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pipeline.run_pipeline --retailer a101 --category fruit_veg

      - name: Refresh materialized views (DEV)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
        run: |
          python - <<EOF
          import psycopg2

          conn = psycopg2.connect("${DATABASE_URL}")
          cur = conn.cursor()

          views = [
              "mart_daily_prices",
              "mart_top_movers",
              "mart_price_anomalies",
              "mart_pipeline_health",
              "mart_latest_prices",
              "mart_daily_prices_by_retailer",
          ]

          for v in views:
              try:
                  cur.execute(f"REFRESH MATERIALIZED VIEW {v}")
                  print(f"Refreshed {v}")
              except Exception as e:
                  print(f"Skipped {v}: {e}")

          conn.commit()
          cur.close()
          conn.close()
          EOF
