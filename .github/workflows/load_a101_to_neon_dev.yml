name: Load A101 to Neon (DEV)

on:
  workflow_dispatch:

concurrency:
  group: load-a101-to-neon-dev
  cancel-in-progress: false

jobs:
  run-etl:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run database migrations (DEV)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "Running migrations on DEV..."
          python scripts/run_migrations.py

      - name: Run A101 pipeline (DEV)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: python -m pipeline.run_pipeline --retailer a101 --category fruit_veg
